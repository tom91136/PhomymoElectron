name: Build RPM

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-rpm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install RPM tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format:check

      - name: Build RPM
        run: npm run dist:rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phomymo-rpm
          path: |
            dist/*.rpm
            dist/*.yml
