name: Build Linux Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format:check

  smoke-test-package:
    runs-on: ubuntu-latest
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            image: ubuntu:22.04
            package_type: deb
          - distro: ubuntu
            image: ubuntu:24.04
            package_type: deb
          - distro: fedora
            image: fedora:40
            package_type: rpm
          - distro: fedora
            image: fedora:41
            package_type: rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install RPM tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        env:
          PACKAGE_TYPE: ${{ matrix.package_type }}
        run: |
          set -euo pipefail
          if [ "$PACKAGE_TYPE" = "deb" ]; then
            npm run dist:deb
          else
            npm run dist:rpm
          fi

      - name: Resolve Package Metadata
        id: meta
        run: |
          APP_BIN="$(node -p "const p=require('./package.json'); (p.build && p.build.executableName) || p.name")"
          echo "app_bin=${APP_BIN}" >> "$GITHUB_OUTPUT"

      - name: Smoke Test Package (--version)
        env:
          APP_BIN: ${{ steps.meta.outputs.app_bin }}
          CONTAINER_IMAGE: ${{ matrix.image }}
          PACKAGE_TYPE: ${{ matrix.package_type }}
        run: |
          set -euo pipefail
          if [ "$PACKAGE_TYPE" = "deb" ]; then
            docker run --rm \
              -v "$PWD/dist:/dist" \
              -e APP_BIN="$APP_BIN" \
              "$CONTAINER_IMAGE" \
              bash -lc 'set -euo pipefail; apt-get update; if apt-cache show libasound2t64 >/dev/null 2>&1; then ALSA_PKG=libasound2t64; else ALSA_PKG=libasound2; fi; DEBIAN_FRONTEND=noninteractive apt-get install -y /dist/*.deb xvfb "$ALSA_PKG" libgbm1 dbus-x11; timeout 120s xvfb-run -a dbus-run-session -- env GTK_USE_PORTAL=0 "$APP_BIN" --no-sandbox --disable-setuid-sandbox --version'
          else
            docker run --rm \
              -v "$PWD/dist:/dist" \
              -e APP_BIN="$APP_BIN" \
              "$CONTAINER_IMAGE" \
              bash -lc 'set -euo pipefail; dnf -y install /dist/*.rpm xorg-x11-server-Xvfb alsa-lib mesa-libgbm dbus-daemon; timeout 120s xvfb-run -a dbus-run-session -- env GTK_USE_PORTAL=0 "$APP_BIN" --no-sandbox --disable-setuid-sandbox --version'
          fi

  smoke-test-appimage:
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install RPM tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm xvfb

      - name: Install dependencies
        run: npm ci

      - name: Build AppImage
        run: npm run dist:appimage

      - name: Smoke Test AppImage (--version)
        run: |
          set -euo pipefail
          APPIMAGE="$(ls dist/*.AppImage | head -n 1)"
          chmod +x "$APPIMAGE"
          APPIMAGE_EXTRACT_AND_RUN=1 timeout 120s xvfb-run -a dbus-run-session -- env GTK_USE_PORTAL=0 "$APPIMAGE" --no-sandbox --disable-setuid-sandbox --version

  release:
    runs-on: ubuntu-latest
    needs:
      - smoke-test-package
      - smoke-test-appimage
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install RPM tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux Packages
        run: npm run dist:linux

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.rpm
            dist/*.deb
            dist/*.AppImage
